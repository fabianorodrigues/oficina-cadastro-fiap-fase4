name: Cadastro Deploy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type DEPLOY to publish Cadastro'
        required: true

permissions:
  contents: read

concurrency:
  group: cadastro-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Validate branch and confirmation
        run: |
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${{ github.event.inputs.confirmation }}" = "DEPLOY"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Validate official config
        shell: pwsh
        run: ./scripts/validate-official-config.ps1

      - name: Validate AWS region
        run: test -n "${{ vars.AWS_REGION }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve platform metadata
        id: platform
        shell: bash
        run: |
          set -euo pipefail
          aws sts get-caller-identity >/dev/null
          cluster="$(aws ssm get-parameter --name /oficina/infra/cluster/name --query 'Parameter.Value' --output text)"
          ecr="$(aws ssm get-parameter --name /oficina/infra/ecr/cadastro --query 'Parameter.Value' --output text)"
          aws secretsmanager describe-secret --secret-id /oficina/cadastro/runtime-db >/dev/null
          aws secretsmanager describe-secret --secret-id /oficina/cadastro/migration-db >/dev/null
          aws secretsmanager list-secret-version-ids --secret-id /oficina/cadastro/runtime-db --include-deprecated --query "Versions[?contains(VersionStages, \`AWSCURRENT\`)] | length(@)" --output text | grep -q '^1$'
          aws secretsmanager list-secret-version-ids --secret-id /oficina/cadastro/migration-db --include-deprecated --query "Versions[?contains(VersionStages, \`AWSCURRENT\`)] | length(@)" --output text | grep -q '^1$'
          {
            echo "cluster=${cluster}"
            echo "ecr=${ecr}"
            echo "runtime_image=${ecr}:${GITHUB_SHA}"
            echo "migration_image=${ecr}:${GITHUB_SHA}-migration"
            echo "migration_job=oficina-cadastro-migration-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v3

      - name: Restore
        run: dotnet restore Oficina.Cadastro.sln

      - name: Build
        run: dotnet build Oficina.Cadastro.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Oficina.Cadastro.sln --configuration Release --no-build

      - name: Build images
        run: |
          docker build -f Dockerfile -t "${{ steps.platform.outputs.runtime_image }}" .
          docker build -f Dockerfile.migration -t "${{ steps.platform.outputs.migration_image }}" .

      - name: Scan images
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.platform.outputs.runtime_image }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Scan migration image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.platform.outputs.migration_image }}
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Push images
        run: |
          docker push "${{ steps.platform.outputs.runtime_image }}"
          docker push "${{ steps.platform.outputs.migration_image }}"

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name "${{ steps.platform.outputs.cluster }}" --region "${{ vars.AWS_REGION }}"

      - name: Validate cluster prerequisites
        run: |
          kubectl get namespace oficina
          kubectl get nodes
          kubectl get csidriver secrets-store.csi.k8s.io
          kubectl get pods -n kube-system -l app=secrets-store-csi-driver
          kubectl get pods -n kube-system -l app=secrets-store-csi-driver-provider-aws

      - name: Render manifests
        shell: pwsh
        run: |
          ./scripts/render-k8s-manifests.ps1 `
            -OutputDirectory ./rendered `
            -RuntimeImage "${{ steps.platform.outputs.runtime_image }}" `
            -MigrationImage "${{ steps.platform.outputs.migration_image }}" `
            -AwsRegion "${{ vars.AWS_REGION }}" `
            -WorkloadIdentityMode PodIdentity `
            -MigrationJobName "${{ steps.platform.outputs.migration_job }}"

      - name: Apply dependencies
        run: |
          kubectl apply -f rendered/service-account.yaml
          kubectl apply -f rendered/secret-provider-class-runtime.yaml
          kubectl apply -f rendered/secret-provider-class-migration.yaml
          kubectl apply -f rendered/configmap.yaml
          kubectl apply -f rendered/service.yaml

      - name: Run migration
        run: |
          kubectl apply -f rendered/migration-job.yaml
          kubectl wait --for=condition=complete "job/${{ steps.platform.outputs.migration_job }}" -n oficina --timeout=900s
          kubectl logs "job/${{ steps.platform.outputs.migration_job }}" -n oficina --tail=200

      - name: Deploy runtime
        run: |
          kubectl apply -f rendered/deployment.yaml
          kubectl rollout status deployment/oficina-cadastro -n oficina --timeout=600s

      - name: Health and readiness
        shell: bash
        run: |
          set -euo pipefail
          kubectl port-forward -n oficina service/oficina-cadastro 18080:8080 >/tmp/cadastro-port-forward.log 2>&1 &
          pf_pid=$!
          trap 'kill $pf_pid || true' EXIT
          sleep 5
          pwsh ./scripts/smoke-test.ps1 -BaseUrl http://127.0.0.1:18080 -ExpectedEnvironment Production

      - name: Read-only validation
        shell: pwsh
        run: ./scripts/validate-cadastro-deployment.ps1 -ExpectedImageTag "${{ github.sha }}" -MigrationJobName "${{ steps.platform.outputs.migration_job }}"

      - name: Step summary
        run: |
          {
            echo "Commit SHA: ${GITHUB_SHA}"
            echo "ECR repository: ${{ steps.platform.outputs.ecr }}"
            echo "Runtime image tag: ${GITHUB_SHA}"
            echo "Migration image tag: ${GITHUB_SHA}-migration"
            echo "Cluster: ${{ steps.platform.outputs.cluster }}"
            echo "Namespace: oficina"
            echo "Migration Job: ${{ steps.platform.outputs.migration_job }}"
            echo "Deployment status: rollout complete"
            echo "Smoke test status: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
