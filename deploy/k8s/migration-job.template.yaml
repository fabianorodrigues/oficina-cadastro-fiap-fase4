apiVersion: batch/v1
kind: Job
metadata:
  name: "@MIGRATION_JOB_NAME@"
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-cadastro
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oficina-cadastro
        app.kubernetes.io/component: migration
    spec:
      serviceAccountName: cadastro-migrator
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: efbundle
          image: "@MIGRATION_IMAGE@"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              connection_file="/mnt/secrets-store/ConnectionStrings__OficinaCadastroDb"
              if [ ! -s "$connection_file" ]; then
                echo "Migration connection string file was not mounted."
                exit 1
              fi
              exec /app/efbundle --connection "$(cat "$connection_file")"
          volumeMounts:
            - name: migration-db
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: migration-db
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: oficina-cadastro-migration-db
